<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CipherVault - Smart Password Manager</title>

    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=DM+Sans:wght@400;500;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #111;
            color: white;
            font-family: 'DM Sans', sans-serif;
        }

        header {
            background: #000;
            padding: 20px 40px;
            border-bottom: 2px solid #ff4d4d;
        }

        header h1 {
            color: #ff4d4d;
            font-size: 2.5rem;
        }

        .container {
            width: 90%;
            max-width: 950px;
            margin: 40px auto;
        }

        .title {
            margin-bottom: 30px;
        }

        .title h2 {
            color: #ff4d4d;
            margin-bottom: 10px;
        }

        .title p {
            color: #bbb;
        }

        .card {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #333;
        }

        .platform-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .platform-logo {
            width: 50px;
            height: 50px;
            border-radius: 12px;
        }

        select {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #111;
            color: white;
            border: 1px solid #444;
            outline: none;
        }

        .password-input {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: #111;
            border: 1px solid #444;
            color: white;
            font-size: 1rem;
            margin-bottom: 25px;
        }

        .risk-box {
            background: #111;
            border-left: 6px solid orange;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
        }

        .risk-box h3 {
            margin-bottom: 10px;
            color: orange;
        }

        .warning {
            color: #ffb347;
            margin-top: 12px;
            line-height: 1.6;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .info-box {
            background: #111;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
        }

        .info-box h4 {
            color: #ff4d4d;
            margin-bottom: 10px;
        }

        .save-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: #ff4d4d;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .save-btn:hover {
            background: #ff6666;
            transform: scale(1.01);
        }

        /* تنسيق التول تيب والزرار الجديد */
        .show-pass-btn {
            background: none;
            border: none;
            color: #ff4d4d;
            cursor: pointer;
            font-size: 1.2rem;
            margin-left: 10px;
            vertical-align: middle;
            position: relative;
        }

        /* Tooltip: كلمة Show me اللي بتظهر لما تقف عليه */
        .show-pass-btn::after {
            content: "Show me";
            position: absolute;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s;
        }

        .show-pass-btn:hover::after {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>

<body>

    <header>
        <h1>CipherVault</h1>
        <div class="back-to-mainPage">
            <a href="{{ url_for('index') }}" class="nav-link">Home</a>
        </div>
    </header>

    <div class="container">

        <div class="title">

            <h2>Smart Password Manager</h2>

            <p>
                Analyze password risks depending on platform sensitivity and security level.
            </p>

        </div>

        <div class="card">

            <!-- PLATFORM -->

            <div class="platform-row">

                <img id="platformLogo" class="platform-logo"
                    src="https://cdn-icons-png.flaticon.com/512/124/124010.png">

                <select id="platformSelect">

                    <option value="facebook">Facebook</option>

                    <option value="instagram">Instagram</option>

                    <option value="gmail">Gmail</option>

                    <option value="github">GitHub</option>

                    <option value="discord">Discord</option>

                    <option value="banking">Banking App</option>

                </select>

            </div>

            <!-- PASSWORD -->

            <input type="password" id="passwordInput" class="password-input" placeholder="Enter your password">

            <!-- RISK -->

            <div class="risk-box">

                <h3 id="riskLevel">
                    Risk : Medium
                </h3>

                <p id="riskText">
                    Password analysis will appear here.
                </p>

                <p class="warning" id="warningText">

                </p>

            </div>

            <!-- EXTRA INFO -->

            <div class="info-grid">

                <div class="info-box">

                    <h4>Last Password Change</h4>

                    <p id="lastChanged">
                        42 days ago
                    </p>

                </div>

                <div class="info-box">

                    <h4>Password Reuse Detection</h4>

                    <p id="reuseText">
                        No reused passwords detected.
                    </p>

                </div>

            </div>

            <!-- BUTTON -->

            <button class="save-btn">
                Save Securely
            </button>

            <button class="save-btn" id="showPasswordsBtn">
                Show Saved Passwords
            </button>
            <div id="savedPasswordsSection" style="display:none; margin-top:25px;">

                <table style="
        width:100%;
        border-collapse:collapse;
        background:#111;
        border:1px solid #333;
        border-radius:10px;
        overflow:hidden;
    ">

                    <thead style="background:#ff4d4d; color:white;">

                        <tr>

                            <th style="padding:15px;">
                                Platform
                            </th>

                            <th style="padding:15px;">
                                Saved Password
                            </th>

                            <th style="padding:15px;">
                                Security
                            </th>

                        </tr>

                    </thead>

                    <tbody id="passwordTableBody">

                    </tbody>

                </table>

            </div>

        </div>

    </div>
    <script>
        // ===================================
        // 1. تعريف العناصر الأساسية (Elements)
        // ===================================
        const platformSelect = document.getElementById("platformSelect");
        const logo = document.getElementById("platformLogo");
        const passwordInput = document.getElementById("passwordInput");
        const riskLevel = document.getElementById("riskLevel");
        const riskText = document.getElementById("riskText");
        const warningText = document.getElementById("warningText");
        const reuseText = document.getElementById("reuseText");
        const saveBtn = document.querySelector(".save-btn");
        const passwordTableBody = document.getElementById("passwordTableBody");
        const savedPasswordsSection = document.getElementById("savedPasswordsSection");
        const showPasswordsBtn = document.getElementById("showPasswordsBtn");

        // ===================================
        // 2. إدارة لوجوهات المنصات
        // ===================================
        const logos = {
            facebook: "https://cdn-icons-png.flaticon.com/512/124/124010.png",
            instagram: "https://cdn-icons-png.flaticon.com/512/2111/2111463.png",
            gmail: "https://cdn-icons-png.flaticon.com/512/281/281769.png",
            github: "https://cdn-icons-png.flaticon.com/512/733/733553.png",
            discord: "https://cdn-icons-png.flaticon.com/512/2111/2111370.png",
            banking: "https://cdn-icons-png.flaticon.com/512/2830/2830284.png"
        };

        platformSelect.addEventListener("change", function () {
            logo.src = logos[this.value];
            analyzePassword();
        });

        passwordInput.addEventListener("input", analyzePassword);

        // ===================================
        // 3. تحليل قوة الباسورد (Logic)
        // ===================================
        function analyzePassword() {
            let password = passwordInput.value;
            let platform = platformSelect.value;
            let score = 0;
            let warnings = [];

            // معايير القوة
            if (password.length >= 8) score++;
            else warnings.push("Password is too short.");

            if (/[A-Z]/.test(password)) score++;
            else warnings.push("Add uppercase letters.");

            if (/[a-z]/.test(password)) score++;
            else warnings.push("Add lowercase letters.");

            if (/[0-9]/.test(password)) score++;
            else warnings.push("Add numbers.");

            if (/[^A-Za-z0-9]/.test(password)) score++;
            else warnings.push("Add special symbols.");

            // مستويات الأمان المطلوبة لكل منصة
            let requiredSecurity = { facebook: 3, instagram: 3, discord: 3, gmail: 4, github: 4, banking: 5 };
            let platformMessages = {
                gmail: "Email accounts are high-risk targets.",
                github: "GitHub accounts may contain sensitive code.",
                banking: "Banking applications require maximum security.",
                facebook: "Avoid using personal info.",
                instagram: "Enable two-factor authentication.",
                discord: "Gaming accounts are often targeted."
            };

            // تحديث واجهة المستخدم بناءً على النتيجة
            if (score < requiredSecurity[platform]) {
                riskLevel.innerText = "Risk : High";
                riskLevel.style.color = "red";
                riskText.innerText = "This password is not secure enough for this platform.";
            } else if (score === requiredSecurity[platform]) {
                riskLevel.innerText = "Risk : Medium";
                riskLevel.style.color = "orange";
                riskText.innerText = "Password security is acceptable but can be improved.";
            } else {
                riskLevel.innerText = "Risk : Low";
                riskLevel.style.color = "lightgreen";
                riskText.innerText = "Excellent password security level.";
            }

            warnings.push(platformMessages[platform]);
            warningText.innerHTML = warnings.join("<br><br>");

            // كشف الكلمات الشائعة
            if (["123456", "password", "admin"].includes(password.toLowerCase())) {
                reuseText.innerText = "This password is commonly used and unsafe.";
            } else {
                reuseText.innerText = "No reused passwords detected.";
            }
        }

        // ===================================
        // 4. الربط مع الباك إند (Flask API)
        // ===================================

        // حفظ الباسورد
        saveBtn.addEventListener("click", function () {
            const data = {
                platform: platformSelect.value,
                password: passwordInput.value,
                strength: riskLevel.innerText
            };

            if (!data.password) {
                alert("Please enter or generate a password first!");
                return;
            }

            fetch('/save_password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
                .then(response => response.json())
                .then(result => {
                    if (result.message) {
                        alert(result.message);
                        // تحديث الجدول تلقائياً إذا كان مفتوحاً
                        if (savedPasswordsSection.style.display === "block") {
                            fetchSavedPasswords();
                        }
                    } else {
                        alert("Error: " + result.error);
                    }
                })
                .catch(err => console.error("Error saving password:", err));
        });

        // جلب الباسوردات من الداتا بيز
       function fetchSavedPasswords() {
        fetch('/get_passwords')
        .then(response => response.json())
        .then(data => {
            passwordTableBody.innerHTML = ""; // بنمسح أي بيانات قديمة (بما فيها الـ 12******** اللي ظاهرة في الصورة)
            
            if(data.length === 0) {
                passwordTableBody.innerHTML = "<tr><td colspan='3' style='text-align:center; padding:10px;'>No saved passwords found.</td></tr>";
                return;
            }

            data.forEach((item, index) => {
                const passId = `pass-${index}`;
                const row = `
                    <tr style="border-bottom: 1px solid #333;">
                        <td style="padding:15px; text-align:center;">${item.platform}</td>
                        <td style="padding:15px; text-align:center;">
                            <!-- هنا بنخزن الباسورد الحقيقي في data-real وبنظهر نجوم بس -->
                            <span id="${passId}" data-real="${item.password}" style="font-family: monospace;">********</span>
                            <button class="show-pass-btn" onclick="togglePass('${passId}')" title="Show me">
                                👁️
                            </button>
                        </td>
                        <td style="padding:15px; text-align:center; color:lightgreen;">${item.strength}</td>
                    </tr>
                `;
                passwordTableBody.innerHTML += row;
            });
        })
        .catch(err => console.error("Error fetching passwords:", err));
    }

    function togglePass(id) {
        const span = document.getElementById(id);
        const realPass = span.getAttribute('data-real');
        
        // لو النص الحالي نجوم، اظهر الباسورد الحقيقي، والعكس
        if (span.innerText === "********") {
            span.innerText = realPass;
            span.style.color = "#ff4d4d"; // نغير لونه عشان اليوزر يعرف إنه ظاهر
        } else {
            span.innerText = "********";
            span.style.color = "white";
        }
    }



        // زرار إظهار/إخفاء قسم الباسوردات المحفوظة
        showPasswordsBtn.addEventListener("click", function () {
            if (savedPasswordsSection.style.display === "none" || savedPasswordsSection.style.display === "") {
                fetchSavedPasswords();
                savedPasswordsSection.style.display = "block";
            } else {
                savedPasswordsSection.style.display = "none";
            }
        });
    </script>
</body>

</html>
