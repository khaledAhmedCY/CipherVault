<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Modern Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='SignUp.css') }}">
</head>
<body>

<div class="signup-container">
    <h2>Create Account</h2>
    <form id="signupForm" action="{{ url_for('signup') }}" method="POST">

        <div class="input-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="username" placeholder="John Doe" required>
        </div>

        <div class="input-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="name@example.com" required>
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>

        <div class="input-group">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
            <p id="message" style="font-size: 0.8rem; margin-top: 5px;"></p>
        </div>

        <button type="submit" id="submitBtn">Sign Up</button>
    </form>

    <div class="footer-text">
        Already have an account? <a href="{{ url_for('login') }}">Login here</a>
    </div>
</div>
<script>
    const password = document.getElementById('password');
    const confirmPassword = document.getElementById('confirm_password');
    const message = document.getElementById('message');
    const form = document.getElementById('signupForm');

    function validatePassword() {
        // If both fields are empty, don't show any message
        if (password.value.length === 0 && confirmPassword.value.length === 0) {
            message.textContent = "";
            confirmPassword.setCustomValidity('');
            return;
        }

        if (password.value !== confirmPassword.value) {
            confirmPassword.setCustomValidity("Passwords Don't Match");
            message.textContent = "✘ Passwords do not match";
            message.style.color = "#f65a41"; 
        } else {
            confirmPassword.setCustomValidity(''); 
            message.textContent = "✔ Passwords match";
            message.style.color = "#2ecc71";
        }
    }

    // Use 'input' instead of 'keyup' for better mobile support
    password.addEventListener('input', validatePassword);
    confirmPassword.addEventListener('input', validatePassword);

    form.onsubmit = function() {
        if (password.value !== confirmPassword.value) {
            return false;
        }
        return true;
    };
</script>

</body>
</html>
